name: Build TrollStore IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode
        run: xcodebuild -version

      - name: Generate Xcode project
        run: swift package generate-xcodeproj || true

      - name: Build app without signing
        run: |
          swift build \
            -c release \
            --arch arm64 \
            -Xswiftc -sdk -Xswiftc $(xcrun --sdk iphoneos --show-sdk-path) \
            -Xswiftc -target -Xswiftc arm64-apple-ios16.0

      - name: Package IPA
        run: |
          BIN_PATH=.build/arm64-apple-ios/release/MiniReader
          test -f "$BIN_PATH"
          mkdir -p Payload/MiniReader.app
          cp "$BIN_PATH" Payload/MiniReader.app/MiniReader
          cp Info.plist Payload/MiniReader.app/Info.plist
          chmod +x Payload/MiniReader.app/MiniReader
          /usr/bin/zip -qry MiniReader-trollstore.ipa Payload
          ls -lh MiniReader-trollstore.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MiniReader-trollstore-ipa
          path: MiniReader-trollstore.ipa
