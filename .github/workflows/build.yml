name: Build TrollStore IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List schemes
        run: xcodebuild -list -project MiniReader.xcodeproj

      - name: Build app without signing
        run: |
          xcodebuild \
            -project MiniReader.xcodeproj \
            -scheme MiniReader \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package IPA
        run: |
          APP_PATH=$(find build -path '*/Release-iphoneos/MiniReader.app' -type d | head -n 1)
          echo "APP_PATH=$APP_PATH"
          test -n "$APP_PATH"
          rm -rf Payload MiniReader-trollstore.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/MiniReader.app
          /usr/bin/zip -qry MiniReader-trollstore.ipa Payload
          ls -lh MiniReader-trollstore.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiniReader-trollstore-ipa
          path: MiniReader-trollstore.ipa

      - name: Publish latest Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: MiniReader 最新版
          body: |
            MiniReader TrollStore 安装包。

            下载下面的 MiniReader-trollstore.ipa，然后在文件 App 里分享给 TrollStore 安装。
          files: MiniReader-trollstore.ipa
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
